<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Browser</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont;}
body{margin:0;background:#f1f3f4}

header{
  display:flex;
  gap:6px;
  padding:8px;
  background:#fff;
  box-shadow:0 1px 4px rgba(0,0,0,.15);
}

input{
  flex:1;
  padding:10px;
  border:1px solid #ccc;
  border-radius:20px;
  outline:none;
  font-size:14px;
}

button{
  border:none;
  background:#1a73e8;
  color:#fff;
  padding:10px 14px;
  border-radius:50%;
  cursor:pointer;
  font-size:14px;
}

button:active{transform:scale(.95)}

#browser{
  width:100%;
  height:calc(100vh - 60px);
  border:none;
  background:#fff;
}
</style>
</head>

<body>

<header>
  <button onclick="goBack()">←</button>
  <button onclick="goForward()">→</button>
  <button onclick="reloadPage()">⟳</button>
  <input id="url" placeholder="Search or type URL">
  <button onclick="go()">Go</button>
</header>

<iframe id="browser" src="https://www.google.com"></iframe>

<script>
const iframe = document.getElementById("browser");
const urlBox = document.getElementById("url");

function go(){
  let url = urlBox.value.trim();
  if(!url) return;

  if(!url.startsWith("http")){
    url = "https://www.google.com/search?q=" + encodeURIComponent(url);
  }
  iframe.src = url;
}

function reloadPage(){
  iframe.contentWindow.location.reload();
}

function goBack(){
  iframe.contentWindow.history.back();
}

function goForward(){
  iframe.contentWindow.history.forward();
}

// Enter key support
urlBox.addEventListener("keydown",e=>{
  if(e.key==="Enter") go();
});
</script>

</body>
</html>
