<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Browser</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#f1f3f4;height:100vh;display:flex;flex-direction:column}

/* Top Bar */
.top{
  padding:10px;
  background:#fff;
  display:flex;
  gap:8px;
  box-shadow:0 2px 6px rgba(0,0,0,.1)
}
.top input{
  flex:1;
  padding:12px 14px;
  border-radius:30px;
  border:1px solid #ccc;
  font-size:15px;
  outline:none;
}
.top button{
  padding:12px 16px;
  border:none;
  border-radius:50%;
  background:#1a73e8;
  color:#fff;
  font-size:16px;
}

/* Search Engine */
.engine{
  margin-top:6px;
  display:flex;
  justify-content:center;
}
.engine select{
  padding:6px 10px;
  border-radius:20px;
  border:1px solid #ccc;
}

/* Browser View */
.view{
  flex:1;
  background:#fff;
}
iframe{
  width:100%;
  height:100%;
  border:none;
}

/* Bottom bar */
.bottom{
  background:#fff;
  padding:10px;
  display:flex;
  justify-content:space-around;
  box-shadow:0 -2px 6px rgba(0,0,0,.1)
}
.bottom button{
  border:none;
  background:none;
  font-size:18px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top">
  <input id="url" placeholder="Search or type URL" onkeydown="if(event.key==='Enter')go()">
  <button onclick="go()">🔍</button>
</div>

<div class="engine">
  <select id="engine">
    <option value="google">Google</option>
    <option value="duck">DuckDuckGo</option>
    <option value="bing">Bing</option>
  </select>
</div>

<!-- VIEW -->
<div class="view">
  <iframe id="browser" src="https://www.google.com"></iframe>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <button onclick="back()">◀</button>
  <button onclick="home()">🏠</button>
  <button onclick="reload()">⟳</button>
</div>

<script>
const iframe = document.getElementById("browser");
const box = document.getElementById("url");
const engine = document.getElementById("engine");

function go(){
  let q = box.value.trim();
  if(!q) return;

  let url="";
  if(q.startsWith("http")){
    url=q;
  }
  else if(q.includes(".")){
    url="https://"+q;
  }
  else{
    if(engine.value==="google")
      url="https://www.google.com/search?q="+encodeURIComponent(q);
    if(engine.value==="duck")
      url="https://duckduckgo.com/?q="+encodeURIComponent(q);
    if(engine.value==="bing")
      url="https://www.bing.com/search?q="+encodeURIComponent(q);
  }
  iframe.src=url;
}

function back(){
  iframe.contentWindow.history.back();
}
function reload(){
  iframe.contentWindow.location.reload();
}
function home(){
  iframe.src="https://www.google.com";
}
</script>

</body>
</html>
